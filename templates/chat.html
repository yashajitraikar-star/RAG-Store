<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini RAG — Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand">💬 Gemini RAG Chatbot</div>
        <div style="display:flex; gap:10px;">
            <a href="/" class="nav-btn">📚 Back to Dashboard</a>
            <button id="signout-btn" class="nav-btn" style="background:transparent; border:1px solid rgba(255,255,255,0.3); color:white; cursor:pointer;">Sign Out</button>
        </div>
    </nav>

    <div class="chat-page">
        <div class="chat-card">

            <div class="chat-info-bar" style="display:flex; justify-content:space-between; align-items:center;">
                <span>🔍 Answers are grounded in your uploaded files</span>
                <button class="btn btn-ghost" style="font-size:0.8rem; padding:4px 12px;"
                    onclick="history=[]; chatLog.innerHTML=''; addMsg('🧹 Chat cleared. Start a new conversation!', 'bot-msg')">
                    🧹 Clear Chat
                </button>
            </div>

            <div id="chat-log" class="chat-log">
                <div class="msg bot-msg">
                    <div class="msg-bubble">
                        👋 Hi! I'm your Gemini RAG assistant. Ask me anything about your uploaded PDFs!
                    </div>
                </div>
            </div>

            <div class="chat-footer">
                <div class="chat-input-row">
                    <input type="text" id="msg-input" class="chat-input" placeholder="Ask a question from your PDFs…"
                        autocomplete="off">
                    <button class="btn btn-primary" id="send-btn">Send ➤</button>
                </div>
                <p class="chat-hint">Press Enter to send · Shift+Enter for new line</p>
            </div>

        </div>
    </div>

    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chatLog = document.getElementById('chat-log');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        // ── Conversation history stored in memory ──────────────────────────────
        let history = [];

        function addMsg(text, cls) {
            const wrap = document.createElement('div');
            wrap.className = 'msg ' + cls;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            // Render markdown for bot messages, plain text for user/error
            if (cls.includes('bot-msg') && !cls.includes('thinking') && !cls.includes('error-msg')) {
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }
            wrap.appendChild(bubble);
            chatLog.appendChild(wrap);
            chatLog.scrollTop = chatLog.scrollHeight;
            return wrap;
        }

        async function send() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            addMsg(msg, 'user-msg');
            msgInput.value = '';
            sendBtn.disabled = true;
            msgInput.disabled = true;

            const thinking = addMsg('⏳ Searching knowledge base…', 'bot-msg thinking');

            try {
                // Get the current logged in user from window object due to module scoping
                const user = window.currentUser;
                const profile = window.userProfile || {};
                const userName = profile.name || (user ? (user.displayName || user.email.split('@')[0]) : "User");

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: msg,
                        history: history,
                        userName: userName,
                        userProfile: profile
                    })
                });

                const data = await res.json();
                chatLog.removeChild(thinking);

                if (!res.ok) throw new Error(data.error || 'Chat failed');

                // ── Save to history ──────────────────────────────────────────────
                history.push({ role: "user", text: msg });
                history.push({ role: "model", text: data.answer });

                addMsg(data.answer, 'bot-msg');

            } catch (err) {
                chatLog.removeChild(thinking);
                addMsg('❌ Error: ' + err.message, 'bot-msg error-msg');
            } finally {
                sendBtn.disabled = false;
                msgInput.disabled = false;
                msgInput.focus();
            }
        }

        sendBtn.addEventListener('click', send);
        msgInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        });
    </script>

    <!-- Firebase Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOIqTa5OCi2d-xSy34YnE4MMZ271OZ-Nk",
            authDomain: "next123-dc2f7.firebaseapp.com",
            projectId: "next123-dc2f7",
            storageBucket: "next123-dc2f7.firebasestorage.app",
            messagingSenderId: "264941557163",
            appId: "1:264941557163:web:bd057beb7bb60756a7eeee",
            measurementId: "G-55N4EXC47D"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '/auth';
            } else {
                window.currentUser = user;

                // Fetch user profile from Firestore
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        window.userProfile = docSnap.data();
                    } else {
                        // Fallback: use Firebase Auth data
                        window.userProfile = { name: user.displayName || user.email.split('@')[0] };
                    }
                } catch (e) {
                    console.warn("Could not fetch Firestore profile:", e);
                    window.userProfile = { name: user.displayName || user.email.split('@')[0] };
                }
            }
        });

        document.getElementById('signout-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>

</html>
