<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gemini RAG</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
      body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          margin: 0;
          background-color: var(--bg-color); /* assuming style.css defines variables */
      }
      .auth-container { 
          max-width: 400px; 
          width: 100%;
          padding: 2.5rem; 
          background: #fff; 
          border-radius: 16px; 
          box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
          text-align: center;
      }
      .auth-title { margin-top: 0; margin-bottom: 1.5rem; color: #333; }
      .google-btn { 
          background: #4285F4; 
          color: white; 
          display: flex; 
          align-items: center; 
          justify-content: center; 
          gap: 12px; 
          padding: 12px; 
          border-radius: 8px; 
          cursor: pointer; 
          border: none; 
          width: 100%; 
          font-size: 1.05rem; 
          font-weight: 500;
          margin-bottom: 20px;
          transition: background 0.2s;
      }
      .google-btn:hover { background: #3367d6; }
      .google-icon { width: 18px; height: 18px; fill: currentColor; }
      
      .divider { 
          text-align: center; 
          margin: 24px 0; 
          color: #888; 
          font-size: 0.9rem; 
          position: relative;
      }
      .divider::before, .divider::after {
          content: "";
          position: absolute;
          top: 50%;
          width: 42%;
          height: 1px;
          background: #e0e0e0;
      }
      .divider::before { left: 0; }
      .divider::after { right: 0; }

      .auth-form {
          display: flex;
          flex-direction: column;
          gap: 15px;
      }
      .auth-form input { 
          width: 100%; 
          padding: 12px 14px; 
          border: 1px solid #ccc; 
          border-radius: 8px; 
          box-sizing: border-box;
          font-size: 1rem;
      }
      .btn-primary {
          width: 100%;
          padding: 12px;
          font-size: 1.05rem;
          border-radius: 8px;
          background: #007bff;
          color: #fff;
          border: none;
          cursor: pointer;
          font-weight: bold;
      }
      .mode-toggle {
          margin-top: 15px;
          font-size: 0.9rem;
          color: #555;
      }
      .mode-toggle a {
          color: #007bff;
          text-decoration: none;
          cursor: pointer;
          font-weight: 600;
      }
      #auth-error {
          color: #dc3545;
          font-size: 0.85rem;
          margin-top: 15px;
          display: none;
          background: #ffe6e6;
          padding: 10px;
          border-radius: 6px;
      }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2 class="auth-title">Welcome</h2>
        
        <button id="google-btn" class="google-btn">
            <svg class="google-icon" viewBox="0 0 48 48"><path fill="#fff" d="M12 21h20v6h-11.5c-1 3.5-4 6-7.5 6-4.5 0-8-3.5-8-8s3.5-8 8-8c1.8 0 3.5.6 4.8 1.6l4.5-4.5c-2.4-2.2-5.7-3.6-9.3-3.6-7.2 0-13 5.8-13 13s5.8 13 13 13c7.5 0 12.5-5.3 12.5-12.7 0-1-.1-1.9-.3-2.8H12v6z"/></svg>
            Sign in with Google
        </button>

        <div class="divider">OR</div>

        <form id="auth-form" class="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit-btn" class="btn-primary">Sign In</button>
        </form>

        <div class="mode-toggle">
            <span id="toggle-text">Don't have an account?</span> 
            <a id="toggle-btn">Sign Up</a>
        </div>

        <div id="auth-error"></div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword 
        } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOIqTa5OCi2d-xSy34YnE4MMZ271OZ-Nk",
            authDomain: "next123-dc2f7.firebaseapp.com",
            projectId: "next123-dc2f7",
            storageBucket: "next123-dc2f7.firebasestorage.app",
            messagingSenderId: "264941557163",
            appId: "1:264941557163:web:bd057beb7bb60756a7eeee",
            measurementId: "G-55N4EXC47D"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let isLoginMode = true;

        // UI toggling between Login and Sign up
        document.getElementById('toggle-btn').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('submit-btn').textContent = isLoginMode ? 'Sign In' : 'Sign Up';
            document.getElementById('toggle-text').textContent = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggle-btn').textContent = isLoginMode ? 'Sign Up' : 'Log In';
            hideError();
        });

        // Google SignIn
        document.getElementById('google-btn').addEventListener('click', async () => {
            hideError();
             try {
                 await signInWithPopup(auth, provider);
                 window.location.href = '/';
             } catch(err) {
                 showError(err.message);
             }
        });

        // Email Form submitting
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pwd);
                } else {
                    await createUserWithEmailAndPassword(auth, email, pwd);
                }
                window.location.href = '/';
            } catch(error) {
                showError(error.message);
            }
        });

        function showError(msg) {
           const errDiv = document.getElementById('auth-error');
           // Make Firebase error messages more user friendly
           errDiv.textContent = msg.replace('Firebase:', '').trim();
           errDiv.style.display = 'block';
        }
        function hideError() {
            document.getElementById('auth-error').style.display = 'none';
        }
    </script>
</body>
</html>
